spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:morva-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  jwt:
    secretKey: test-secret-key-test-secret-key-test-secret-key
    accessExp: 3600
    refreshExp: 7200
    header: Authorization
    prefix: Bearer

  data:
    redis:
      host: localhost
      port: 6379

  oauth:
    redirect:
      frontend-url: http://localhost:3000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope:
              - email
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope:
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: email
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

cloud:
  file:
    seaweedfs:
      bucket: test-bucket
      endpoint: http://localhost:8333
      url-prefix: test-prefix
      region: us-east-1
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
